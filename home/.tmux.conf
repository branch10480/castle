# ─────────────────────────────────────────────────────────────
# Plugins (tpm)
# ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# nvim window と tmux pane を C-h/j/k/l でシームレスに行き来する。
# 初回は `prefix + I` (大文字 I) で TPM に install させる必要あり。
set -g @plugin 'christoomey/vim-tmux-navigator'

# ─────────────────────────────────────────────────────────────
# Server / terminal capability
# ─────────────────────────────────────────────────────────────
# fixterms (CSI u) を tmux に解釈させる。ghostty が C-; / C-' / C-S-= 等を
# `^[[59;5u` のような拡張キーシーケンスで送ってくるのを受け取るために必須。
set -s extended-keys on
set -as terminal-features ',*:extkeys'
# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ',*:RGB'

# ─────────────────────────────────────────────────────────────
# Prefix / mouse
# ─────────────────────────────────────────────────────────────
# ghostty 互換キー (bind -n) を主軸にしたので prefix は基本未使用だが、
# tmux native UI (prefix s でセッション一覧 等) のために C-a を残す。
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on

# ─────────────────────────────────────────────────────────────
# ghostty 互換キーバインド (bind -n = no prefix)
# ─────────────────────────────────────────────────────────────
# ペイン分割 (ghostty: ctrl+semicolon / ctrl+apostrophe)
# tmux DSL では ; と ' をバックスラッシュエスケープする必要あり。
bind -n 'C-\;' split-window -h -c "#{pane_current_path}"
bind -n "C-'" split-window -v -c "#{pane_current_path}"

# ペイン移動 (ghostty: ctrl+h/j/k/l) は vim-tmux-navigator が
# bind -n C-h/j/k/l を自動で敷くので、ここでは何も書かない。
# nvim/vim/fzf にフォーカスがある時は nvim 側に伝播される。

# ペインリサイズ (ghostty: ctrl+shift+h/j/k/l, 30 セル単位)
bind -n C-S-h resize-pane -L 30
bind -n C-S-j resize-pane -D 30
bind -n C-S-k resize-pane -U 30
bind -n C-S-l resize-pane -R 30

# ペイン均等化 (ghostty: ctrl+shift+= = equalize_splits)
# tmux に「両方向 equalize」は無いので select-layout -E (spread evenly) を使う。
bind -n C-S-= select-layout -E

# ─────────────────────────────────────────────────────────────
# Copy mode (ghostty: ctrl+shift+x で起動 → vim-like 操作)
# ─────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -n C-S-x copy-mode

# ghostty key table と同じ操作感を copy-mode-vi に乗せる。
# j/k/g/G/n/N は vi のデフォルトと一致するので追加 bind 不要。
bind -T copy-mode-vi u send -X halfpage-up
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi q send -X cancel

# ─────────────────────────────────────────────────────────────
# Appearance
# ─────────────────────────────────────────────────────────────
# ステータスバー非表示
set -g status off

# ペインボーダー（アクティブ・非アクティブ共通でグレー、背景透明）
set -g pane-border-style fg=colour240,bg=default
set -g pane-active-border-style fg=colour240,bg=default

# メッセージ表示（モノクロ・透明背景）
set -g message-style fg=white,bg=default
set -g message-command-style fg=white,bg=default

# ─────────────────────────────────────────────────────────────
# Initialize TMUX plugin manager (keep this line at the very bottom)
# ─────────────────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
