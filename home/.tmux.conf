# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# マウス操作を有効にする
set -g mouse on

# prefixキーをC-aに変更する
set -g prefix C-a

# デフォルトのprefixキーC-bを解除する
unbind C-b

# Key Binding
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ステータスバー非表示
set -g status off

# ペインボーダー（アクティブ・非アクティブ共通でグレー、背景透明）
set -g pane-border-style fg=colour240,bg=default
set -g pane-active-border-style fg=colour240,bg=default

# メッセージ表示（モノクロ・透明背景）
set -g message-style fg=white,bg=default
set -g message-command-style fg=white,bg=default

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
